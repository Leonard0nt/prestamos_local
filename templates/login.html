<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <main class="container" style="max-width: 430px;">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 text-center mb-3">📚 Sistema de Biblioteca</h1>
                <p class="text-center text-secondary mb-4">Inicia sesión como administrador o encargado.</p>

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">Usuario</label>
                        <input class="form-control" id="id_username" type="text" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="id_password">Contraseña</label>
                        <div class="input-group">
                            <input class="form-control" id="id_password" type="password" name="password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">Mostrar</button>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Ingresar</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const passwordInput = document.getElementById('id_password');
        const togglePasswordBtn = document.getElementById('togglePassword');

        togglePasswordBtn.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            togglePasswordBtn.innerText = isHidden ? 'Ocultar' : 'Mostrar';
        });
    </script>

    <script>
        (function configurarRecuperacionEnLogin() {
            if (window.__loginRecoveryReady) return;
            window.__loginRecoveryReady = true;

            let overlay = null;

            function crearOverlay() {
                if (overlay) return overlay;
                overlay = document.createElement('div');
                overlay.style.cssText = [
                    'position:fixed',
                    'inset:0',
                    'background:rgba(15,23,42,0.88)',
                    'color:#fff',
                    'display:none',
                    'align-items:center',
                    'justify-content:center',
                    'z-index:3000',
                    'padding:16px'
                ].join(';');
                overlay.innerHTML = `
                    <div style="max-width:520px;background:#0f172a;border:1px solid #334155;border-radius:12px;padding:20px;text-align:center;">
                        <h4 style="margin:0 0 8px 0;">📡 Sin conexión</h4>
                        <p style="margin:0 0 12px 0;">Cuando vuelva internet, puedes recargar desde aquí.</p>
                        <button id="btnReintentarLogin" type="button" class="btn btn-light btn-sm">Reintentar ahora</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                overlay.querySelector('#btnReintentarLogin')?.addEventListener('click', () => window.location.reload());
                return overlay;
            }

            function mostrarOverlay() {
                crearOverlay().style.display = 'flex';
            }

            function crearBotonRecarga() {
                if (document.getElementById('btnRecargaRapidaLogin')) return;
                const boton = document.createElement('button');
                boton.id = 'btnRecargaRapidaLogin';
                boton.type = 'button';
                boton.className = 'btn btn-primary btn-sm';
                boton.textContent = '↻ Recargar';
                boton.style.cssText = 'position:fixed;right:16px;bottom:16px;z-index:2500;box-shadow:0 6px 16px rgba(0,0,0,.25);';
                boton.addEventListener('click', () => window.location.reload());
                document.body.appendChild(boton);
            }

            window.addEventListener('offline', mostrarOverlay);
            window.addEventListener('online', () => window.location.reload());

            crearBotonRecarga();
        })();
    </script>
</body>

</html>
