<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - Biblioteca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
.table {
    border-collapse: collapse !important;
}

thead th {
    position: sticky;
    top: 0;
    background-color: #212529;
    z-index: 2;
}
</style>
<body style="background-color: #f1f3f5;">

    {% include 'partials/app_menu.html' with active='usuarios' %}
    <form style="display:none;">{% csrf_token %}</form>
<!-- CONTENEDOR CENTRADO -->
<div class="d-flex justify-content-center py-4">

    <!-- CUADRO PRINCIPAL -->
    <div class="bg-white p-4 rounded shadow-lg" style="width: 100%; max-width: 1100px;">

        <h2 class="mb-4">👥 Gestión de Usuarios</h2>
        <div class="mb-3">
    <input type="text" 
           id="buscadorUsuarios"
           class="form-control"
           placeholder="🔍 Buscar por nombre, RUT o email..."
           onkeyup="filtrarUsuarios()">
</div>
        <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#modalCrear">
            ➕ Agregar Usuario
        </button>

    <div style="max-height: 400px; overflow-y: auto;">
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Curso</th>
                    <th>Email</th>
                    <th>RUT</th>
                    <th>Teléfono</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaUsuarios"></tbody>
        </table>
    </div>
    <nav class="mt-3" aria-label="Paginación usuarios">
        <ul class="pagination justify-content-center mb-0" id="paginacionUsuarios"></ul>
    </nav>

    </div>
</div>

<!-- MODAL CREAR -->
<div class="modal fade" id="modalCrear">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Crear Usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input id="crear_nombres" class="form-control mb-2" placeholder="Nombres">
        <input id="crear_apellidos" class="form-control mb-2" placeholder="Apellidos">
        <input id="crear_email" type="email" class="form-control mb-2" placeholder="Correo electrónico">
        <input id="crear_curso" class="form-control mb-2" placeholder="Curso">
        <input id="crear_rut"
       class="form-control mb-2"
       placeholder="12.345.678-5"
       oninput="formatearRUT(this)"
       onblur="validarRUT(this)">
<div id="error_rut_crear" class="text-danger small"></div>
        <div class="input-group mb-2">
    <span class="input-group-text">+56</span>
    <input id="crear_telefono" 
           class="form-control"
           maxlength="9"
           placeholder="912345678"
           oninput="validarTelefono(this)">
</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success" onclick="crearUsuario()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditar">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Editar Usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="edit_id">
        <input id="edit_nombres" class="form-control mb-2" placeholder="Nombres">
        <input id="edit_apellidos" class="form-control mb-2" placeholder="Apellidos">
        <input id="edit_email" class="form-control mb-2">
        <input id="edit_curso" class="form-control mb-2" placeholder="Curso">
        <input id="edit_rut"
       class="form-control mb-2"
       oninput="formatearRUT(this)"
       onblur="validarRUT(this)">
<div id="error_rut_edit" class="text-danger small"></div>
        <div class="input-group mb-2">
    <span class="input-group-text">+56</span>
    <input id="edit_telefono" 
           class="form-control"
           maxlength="9"
           oninput="validarTelefono(this)">
</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-warning" onclick="guardarEdicion()">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
const REGISTROS_POR_PAGINA = 20;
const REFRESH_INTERVAL_MS = 10000;
let usuariosData = [];
let usuariosPaginaActual = 1;
let usuariosAutoRefreshId = null;

function getCookie(name) {
    const cookies = document.cookie ? document.cookie.split(';') : [];
    for (const cookie of cookies) {
        const cookieTrimmed = cookie.trim();
        if (cookieTrimmed.startsWith(`${name}=`)) {
            return decodeURIComponent(cookieTrimmed.substring(name.length + 1));
        }
    }
    return null;
}

function getCsrfHeaders() {
    const csrftoken = getCookie('csrftoken');
    return csrftoken ? { "X-CSRFToken": csrftoken } : {};
}

// ================= CARGAR =================
async function cargarUsuarios({ resetPagina = false } = {}) {
    const res = await fetch(`${API}/usuarios/`);
    if (!res.ok) return;

    const nuevosUsuarios = await res.json();
    const cambioDatos = JSON.stringify(nuevosUsuarios) !== JSON.stringify(usuariosData);

    usuariosData = nuevosUsuarios;
    if (resetPagina) {
        usuariosPaginaActual = 1;
    }

    if (!cambioDatos && !resetPagina) {
        return;
    }

    renderizarTablaUsuarios();
}

function obtenerUsuariosFiltrados() {
    const filtro = document.getElementById("buscadorUsuarios").value.toLowerCase();
    return usuariosData.filter((usuario) => {
        return (
            usuario.nombre.toLowerCase().includes(filtro) ||
            usuario.rut.toLowerCase().includes(filtro) ||
            (usuario.curso || "").toLowerCase().includes(filtro) ||
            usuario.email.toLowerCase().includes(filtro)
        );
    });
}

function renderizarTablaUsuarios() {
    const tabla = document.getElementById("tablaUsuarios");
    const data = obtenerUsuariosFiltrados();
    const totalPaginas = Math.max(1, Math.ceil(data.length / REGISTROS_POR_PAGINA));
    if (usuariosPaginaActual > totalPaginas) usuariosPaginaActual = totalPaginas;
    const inicio = (usuariosPaginaActual - 1) * REGISTROS_POR_PAGINA;
    const paginaData = data.slice(inicio, inicio + REGISTROS_POR_PAGINA);

    tabla.innerHTML = "";
    if (!paginaData.length) {
        tabla.innerHTML = `<tr><td colspan="6" class="text-center text-muted">Sin resultados.</td></tr>`;
    }

    paginaData.forEach(u => {
        tabla.innerHTML += `
            <tr>
                <td>${u.nombre}</td>
                <td>${u.curso || ""}</td>
                <td>${u.email}</td>
                <td>${u.rut}</td>
                <td>${u.telefono}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick='abrirEditar(${JSON.stringify(u)})'>
                        Editar
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${u.id})">
                        Eliminar
                    </button>
                </td>
            </tr>
        `;
    });

    renderizarPaginacionUsuarios(totalPaginas);
}

function renderizarPaginacionUsuarios(totalPaginas) {
    const paginacion = document.getElementById("paginacionUsuarios");
    paginacion.innerHTML = "";

    for (let pagina = 1; pagina <= totalPaginas; pagina++) {
        paginacion.innerHTML += `
            <li class="page-item ${pagina === usuariosPaginaActual ? "active" : ""}">
                <button class="page-link" type="button" onclick="irPaginaUsuarios(${pagina})">${pagina}</button>
            </li>
        `;
    }
}

function irPaginaUsuarios(pagina) {
    usuariosPaginaActual = pagina;
    renderizarTablaUsuarios();
}
// Formatear RUT
function formatearRUT(input) {
    let valor = input.value.replace(/[^0-9kK]/g, '').toUpperCase();

    if (valor.length > 1) {
        let cuerpo = valor.slice(0, -1);
        let dv = valor.slice(-1);

        cuerpo = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        input.value = cuerpo + "-" + dv;
    } else {
        input.value = valor;
    }
} 
// Filtrar usuarios
function filtrarUsuarios() {
    usuariosPaginaActual = 1;
    renderizarTablaUsuarios();
}

function validarRUT(input) {

    // 🔥 PROTECCIÓN TOTAL
    if (!input || !input.value) {
        console.error("validarRUT recibió algo inválido:", input);
        return false;
    }

    const rut = input.value;

    const errorDiv = input.id && input.id.includes("crear")
        ? document.getElementById("error_rut_crear")
        : document.getElementById("error_rut_edit");

    if (!errorDiv) {
        console.error("No se encontró el div de error");
        return false;
    }

    let valor = rut.replace(/\./g, '').replace('-', '');

    if (valor.length < 2) {
        errorDiv.innerText = "RUT inválido";
        return false;
    }

    let cuerpo = valor.slice(0, -1);
    let dv = valor.slice(-1).toUpperCase();

    let suma = 0;
    let multiplo = 2;

    for (let i = cuerpo.length - 1; i >= 0; i--) {
        suma += multiplo * cuerpo.charAt(i);
        multiplo = multiplo < 7 ? multiplo + 1 : 2;
    }

    let dvEsperado = 11 - (suma % 11);

    if (dvEsperado === 11) dvEsperado = "0";
    else if (dvEsperado === 10) dvEsperado = "K";
    else dvEsperado = dvEsperado.toString();

    if (dv !== dvEsperado) {
        errorDiv.innerText = "RUT inválido";
        return false;
    }

    errorDiv.innerText = "";
    return true;
}

function separarNombreCompleto(nombreCompleto = "") {
    const nombreLimpio = (nombreCompleto || "").trim().replace(/\s+/g, " ");
    if (!nombreLimpio) {
        return { nombres: "", apellidos: "" };
    }

    const partes = nombreLimpio.split(" ");
    if (partes.length === 1) {
        return { nombres: partes[0], apellidos: "" };
    }

    return {
        nombres: partes.slice(0, -1).join(" "),
        apellidos: partes.slice(-1).join(" ")
    };
}

function construirNombreCompleto(nombres, apellidos) {
    return [nombres, apellidos]
        .map((valor) => (valor || "").trim())
        .filter(Boolean)
        .join(" ");
}
// ================= CREAR =================
async function crearUsuario() {
    const nombres = document.getElementById("crear_nombres").value;
    const apellidos = document.getElementById("crear_apellidos").value;
    const nombre = construirNombreCompleto(nombres, apellidos);
    const email = document.getElementById("crear_email").value.trim();
    const curso = document.getElementById("crear_curso").value.trim();
    const rutInput = document.getElementById("crear_rut");
    const rut = rutInput.value;

    if (!validarRUT(rutInput)) {
        alert("RUT inválido");
        return;
    }

    const telefono = "+56" + document.getElementById("crear_telefono").value;


    const response = await fetch(`${API}/usuarios/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            ...getCsrfHeaders()
        },
        body: JSON.stringify({ nombre, curso, email, rut, telefono })
    });
    if (!response.ok) {
        const errorPayload = await response.json().catch(() => ({}));
        const errores = Object.entries(errorPayload)
            .map(([campo, mensajes]) => `${campo}: ${Array.isArray(mensajes) ? mensajes.join(", ") : mensajes}`)
            .join("\n");
        alert(`No se pudo guardar el usuario.${errores ? `\n${errores}` : ""}`);
        return;
    }

    cargarUsuarios({ resetPagina: true });
    bootstrap.Modal.getInstance(document.getElementById('modalCrear')).hide();
}
// Limitar 9 numeros en telefono
function validarTelefono(input) {
    // eliminar todo lo que no sea número
    input.value = input.value.replace(/\D/g, '');

    // limitar a 9 dígitos
    if (input.value.length > 9) {
        input.value = input.value.slice(0, 9);
    }
}

// ================= ELIMINAR =================
async function eliminarUsuario(id) {
    if (!confirm("¿Eliminar usuario?")) return;

    await fetch(`${API}/usuarios/${id}/`, {
        method: "DELETE",
        headers: {
            ...getCsrfHeaders()
        }
    });

    cargarUsuarios({ resetPagina: true });
}

// ================= EDITAR =================
function abrirEditar(u) {
    const { nombres, apellidos } = separarNombreCompleto(u.nombre);
    document.getElementById("edit_id").value = u.id;
    document.getElementById("edit_nombres").value = nombres;
    document.getElementById("edit_apellidos").value = apellidos;
    document.getElementById("edit_curso").value = u.curso || "";
    document.getElementById("edit_email").value = u.email;
    document.getElementById("edit_rut").value = u.rut;
    document.getElementById("edit_telefono").value = u.telefono.replace("+56", "");

    const modal = new bootstrap.Modal(document.getElementById("modalEditar"));
    modal.show();
}

async function guardarEdicion() {
    const id = document.getElementById("edit_id").value;

    const nombres = document.getElementById("edit_nombres").value;
    const apellidos = document.getElementById("edit_apellidos").value;
    const nombre = construirNombreCompleto(nombres, apellidos);
    const curso = document.getElementById("edit_curso").value.trim();
    const email = document.getElementById("edit_email").value;
    const rutInput = document.getElementById("edit_rut");
    const rut = rutInput.value;
    if (!validarRUT(rutInput)) {
    alert("RUT inválido");
    return;
}
    const telefono = "+56" + document.getElementById("edit_telefono").value;

    await fetch(`${API}/usuarios/${id}/`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            ...getCsrfHeaders()
        },
        body: JSON.stringify({ nombre, curso, email, rut, telefono })
    });

    cargarUsuarios();
    bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
}
function iniciarAutoRefreshUsuarios() {
    if (usuariosAutoRefreshId) return;

    usuariosAutoRefreshId = setInterval(() => {
        if (document.visibilityState !== "visible") return;
        cargarUsuarios();
    }, REFRESH_INTERVAL_MS);
}

// ================= INIT =================
cargarUsuarios({ resetPagina: true });
iniciarAutoRefreshUsuarios();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
