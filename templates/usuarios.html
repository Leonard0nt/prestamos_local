<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - Biblioteca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
.table {
    border-collapse: collapse !important;
}

thead th {
    position: sticky;
    top: 0;
    background-color: #212529;
    z-index: 2;
}
</style>
<body style="background-color: #f1f3f5;">

<!-- CONTENEDOR CENTRADO -->
<div class="d-flex justify-content-center align-items-center min-vh-100">

    <!-- CUADRO PRINCIPAL -->
    <div class="bg-white p-4 rounded shadow-lg" style="width: 100%; max-width: 1100px;">

        <h2 class="mb-4">👥 Gestión de Usuarios</h2>
        <div class="mb-3">
    <input type="text" 
           id="buscadorUsuarios"
           class="form-control"
           placeholder="🔍 Buscar por nombre, RUT o email..."
           onkeyup="filtrarUsuarios()">
</div>
        <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#modalCrear">
            ➕ Agregar Usuario
        </button>

    <div style="max-height: 400px; overflow-y: auto;">
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>RUT</th>
                    <th>Teléfono</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaUsuarios"></tbody>
        </table>
    </div>

    </div>
</div>

<!-- MODAL CREAR -->
<div class="modal fade" id="modalCrear">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Crear Usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input id="crear_nombre" class="form-control mb-2" placeholder="Nombre">
        <input id="crear_email" class="form-control mb-2" placeholder="Email">
        <input id="crear_rut"
       class="form-control mb-2"
       placeholder="12.345.678-5"
       oninput="formatearRUT(this)"
       onblur="validarRUT(this)">
<div id="error_rut_crear" class="text-danger small"></div>
        <div class="input-group mb-2">
    <span class="input-group-text">+56</span>
    <input id="crear_telefono" 
           class="form-control"
           maxlength="9"
           placeholder="912345678"
           oninput="validarTelefono(this)">
</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success" onclick="crearUsuario()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditar">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Editar Usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit_id">
        <input id="edit_nombre" class="form-control mb-2">
        <input id="edit_email" class="form-control mb-2">
        <input id="edit_rut"
       class="form-control mb-2"
       oninput="formatearRUT(this)"
       onblur="validarRUT(this)">
<div id="error_rut_edit" class="text-danger small"></div>
        <div class="input-group mb-2">
    <span class="input-group-text">+56</span>
    <input id="edit_telefono" 
           class="form-control"
           maxlength="9"
           oninput="validarTelefono(this)">
</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-warning" onclick="guardarEdicion()">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8000";

// ================= CARGAR =================
async function cargarUsuarios() {
    const res = await fetch(`${API}/usuarios/`);
    const data = await res.json();

    const tabla = document.getElementById("tablaUsuarios");
    tabla.innerHTML = "";

    data.forEach(u => {
        tabla.innerHTML += `
            <tr>
                <td>${u.nombre}</td>
                <td>${u.email}</td>
                <td>${u.rut}</td>
                <td>${u.telefono}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick='abrirEditar(${JSON.stringify(u)})'>
                        Editar
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${u.id})">
                        Eliminar
                    </button>
                </td>
            </tr>
        `;
    });
}
// Formatear RUT
function formatearRUT(input) {
    let valor = input.value.replace(/[^0-9kK]/g, '').toUpperCase();

    if (valor.length > 1) {
        let cuerpo = valor.slice(0, -1);
        let dv = valor.slice(-1);

        cuerpo = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        input.value = cuerpo + "-" + dv;
    } else {
        input.value = valor;
    }
} 
// Filtrar usuarios
function filtrarUsuarios() {
    const filtro = document.getElementById("buscadorUsuarios").value.toLowerCase();
    const filas = document.querySelectorAll("#tablaUsuarios tr");

    filas.forEach(fila => {
        const texto = fila.innerText.toLowerCase();

        if (texto.includes(filtro)) {
            fila.style.display = "";
        } else {
            fila.style.display = "none";
        }
    });
}

function validarRUT(input) {

    // 🔥 PROTECCIÓN TOTAL
    if (!input || !input.value) {
        console.error("validarRUT recibió algo inválido:", input);
        return false;
    }

    const rut = input.value;

    const errorDiv = input.id && input.id.includes("crear")
        ? document.getElementById("error_rut_crear")
        : document.getElementById("error_rut_edit");

    if (!errorDiv) {
        console.error("No se encontró el div de error");
        return false;
    }

    let valor = rut.replace(/\./g, '').replace('-', '');

    if (valor.length < 2) {
        errorDiv.innerText = "RUT inválido";
        return false;
    }

    let cuerpo = valor.slice(0, -1);
    let dv = valor.slice(-1).toUpperCase();

    let suma = 0;
    let multiplo = 2;

    for (let i = cuerpo.length - 1; i >= 0; i--) {
        suma += multiplo * cuerpo.charAt(i);
        multiplo = multiplo < 7 ? multiplo + 1 : 2;
    }

    let dvEsperado = 11 - (suma % 11);

    if (dvEsperado === 11) dvEsperado = "0";
    else if (dvEsperado === 10) dvEsperado = "K";
    else dvEsperado = dvEsperado.toString();

    if (dv !== dvEsperado) {
        errorDiv.innerText = "RUT inválido";
        return false;
    }

    errorDiv.innerText = "";
    return true;
}
// ================= CREAR =================
async function crearUsuario() {
    const nombre = document.getElementById("crear_nombre").value;
    const email = document.getElementById("crear_email").value;
    const rutInput = document.getElementById("crear_rut");
    const rut = rutInput.value;

    if (!validarRUT(rutInput)) {
        alert("RUT inválido");
        return;
    }

    const telefono = "+56" + document.getElementById("crear_telefono").value;

    await fetch(`${API}/usuarios/`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ nombre, email, rut, telefono })
    });

    cargarUsuarios();
    bootstrap.Modal.getInstance(document.getElementById('modalCrear')).hide();
}
// Limitar 9 numeros en telefono
function validarTelefono(input) {
    // eliminar todo lo que no sea número
    input.value = input.value.replace(/\D/g, '');

    // limitar a 9 dígitos
    if (input.value.length > 9) {
        input.value = input.value.slice(0, 9);
    }
}

// ================= ELIMINAR =================
async function eliminarUsuario(id) {
    if (!confirm("¿Eliminar usuario?")) return;

    await fetch(`${API}/usuarios/${id}/`, {
        method: "DELETE"
    });

    cargarUsuarios();
}

// ================= EDITAR =================
function abrirEditar(u) {
    document.getElementById("edit_id").value = u.id;
    document.getElementById("edit_nombre").value = u.nombre;
    document.getElementById("edit_email").value = u.email;
    document.getElementById("edit_rut").value = u.rut;
    document.getElementById("edit_telefono").value = u.telefono.replace("+56", "");

    const modal = new bootstrap.Modal(document.getElementById("modalEditar"));
    modal.show();
}

async function guardarEdicion() {
    const id = document.getElementById("edit_id").value;

    const nombre = document.getElementById("edit_nombre").value;
    const email = document.getElementById("edit_email").value;
    const rut = document.getElementById("edit_rut").value;
    if (!validarRUT(rut)) {
    alert("RUT inválido");
    return;
}
    const telefono = "+56" + document.getElementById("edit_telefono").value;

    await fetch(`${API}/usuarios/${id}/`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ nombre, email, rut, telefono })
    });

    cargarUsuarios();
    bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
}

// ================= INIT =================
cargarUsuarios();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
