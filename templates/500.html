<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor no disponible</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
    <main class="container" style="max-width:560px;">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5 text-center">
                <h1 class="h3 mb-3">⚠️ Servidor no disponible</h1>
                <p class="text-secondary mb-4">
                    Ocurrió un error interno (<strong>500</strong>). Puedes recargar cuando el servidor vuelva a estar operativo.
                </p>
                <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                    <button id="btnReintentar500" type="button" class="btn btn-primary">
                        ↻ Reintentar ahora
                    </button>
                    <a class="btn btn-outline-secondary" href="/login/">Ir al inicio de sesión</a>
                </div>
                <p id="estadoConexion500" class="small text-secondary mt-3 mb-0"></p>
            </div>
        </div>
    </main>

    <script>
        const estado = document.getElementById('estadoConexion500');
        const btnReintentar = document.getElementById('btnReintentar500');

        function recargar() {
            window.location.reload();
        }

        btnReintentar?.addEventListener('click', recargar);

        window.addEventListener('online', recargar);
        window.addEventListener('offline', () => {
            if (estado) estado.innerText = 'Sin internet. Se reintentará automáticamente al reconectar.';
        });

        setInterval(async () => {
            try {
                const response = await fetch('/login/', { method: 'HEAD', cache: 'no-store' });
                if (response.ok) {
                    recargar();
                    return;
                }
                if (estado) estado.innerText = 'El servidor sigue sin responder. Puedes intentar nuevamente.';
            } catch (_) {
                if (estado) estado.innerText = 'Esperando conexión con el servidor...';
            }
        }, 5000);
    </script>
</body>
</html>
