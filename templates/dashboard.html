<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Préstamos - Biblioteca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    .table {
        border-collapse: collapse !important;
    }

    thead th {
        position: sticky;
        top: 0;
        background-color: #212529;
        z-index: 2;
    }
</style>

<body style="background-color: #f1f3f5;">

{% include 'partials/app_menu.html' with active='prestamos' %}

    <div class="d-flex justify-content-center py-4">

        <div class="bg-white p-4 rounded shadow-lg" style="width: 100%; max-width: 1100px;">

            <h2 class="mb-4">📦 Gestión de Préstamos</h2>

            <input type="text" id="buscadorPrestamos" class="form-control mb-3" placeholder="🔍 Buscar..."
                onkeyup="filtrarPrestamos()">

            <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#modalCrear">
                ➕ Nuevo Préstamo
            </button>


            <div style="max-height: 400px; overflow-y: auto;">
                <table class="table table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Usuario</th>
                            <th>Libro</th>
                            <th>F. Préstamo</th>
                            <th>F. Devolución</th>
                            <th>Estado</th>
                            <th>Días atraso</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaPrestamos"></tbody>
                </table>
            </div>
            <nav class="mt-3" aria-label="Paginación préstamos">
                <ul class="pagination justify-content-center mb-0" id="paginacionPrestamos"></ul>
            </nav>
        </div>
    </div>

    <!-- MODAL CREAR -->
    <div class="modal fade" id="modalCrear">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5>Nuevo Préstamo</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <select id="crear_usuario" class="form-control mb-2"></select>
                    <select id="crear_libro" class="form-control mb-2" onchange="cargarEjemplaresLibro()"></select>

                    <select id="crear_ejemplar" class="form-control mb-2">
                        <option value="">Selecciona un ejemplar</option>
                    </select>

                    <label>Fecha devolución</label>
                    <input type="date" id="crear_fecha_dev" class="form-control">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success" onclick="crearPrestamo()">Guardar</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        const modalCrear = document.getElementById("modalCrear");
        const csrfToken = getCookie("csrftoken");

        const REGISTROS_POR_PAGINA = 20;
        let prestamosData = [];
        let prestamosPaginaActual = 1;
        function sumarDiasCalendario(fechaBase, dias) {
            const fecha = new Date(fechaBase);
            fecha.setDate(fecha.getDate() + dias);
            return fecha;
        }

        function formatearFechaISO(fecha) {
            const year = fecha.getFullYear();
            const month = String(fecha.getMonth() + 1).padStart(2, "0");
            const day = String(fecha.getDate()).padStart(2, "0");
            return `${year}-${month}-${day}`;
        }

        function precargarFechaDevolucion() {
            const fechaInput = document.getElementById("crear_fecha_dev");
            const hoy = new Date();
            const fechaDefault = sumarDiasCalendario(hoy, 12);
            fechaInput.value = formatearFechaISO(fechaDefault);
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== "") {
                const cookies = document.cookie.split(";");
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === `${name}=`) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        // ================= CARGAR EJEMPLARES =================
async function cargarEjemplaresLibro() {

    const libroId = document.getElementById("crear_libro").value;

    if (!libroId) return; // 

    const res = await fetch(`${API}/libros/${libroId}/ejemplares_json/`);
    const data = await res.json();

    const select = document.getElementById("crear_ejemplar");
    select.innerHTML = "";

    data.forEach(e => {
        if (e.estado === "disponible") {
            select.innerHTML += `
                <option value="${e.id}">
                    ${e.codigo} (${e.estado})
                </option>
            `;
        }
    });

    if (select.innerHTML === "") {
        select.innerHTML = `<option>No hay ejemplares disponibles</option>`;
    }
}
        // ================= CARGAR =================
        async function cargarPrestamos() {
            const res = await fetch(`${API}/prestamos/`);
            prestamosData = await res.json();
            prestamosPaginaActual = 1;
            renderizarTablaPrestamos();
        }

        function obtenerPrestamosFiltrados() {
            const filtro = document.getElementById("buscadorPrestamos").value.toLowerCase();
            return prestamosData.filter((prestamo) => {
                return (
                    prestamo.usuario_detalle.toLowerCase().includes(filtro) ||
                    prestamo.ejemplar_detalle.toLowerCase().includes(filtro) ||
                    prestamo.fecha_prestamo.toLowerCase().includes(filtro) ||
                    prestamo.fecha_devolucion.toLowerCase().includes(filtro)
                );
            });
        }


        function renderizarTablaPrestamos() {
            const tabla = document.getElementById("tablaPrestamos");
            const data = obtenerPrestamosFiltrados();
            const totalPaginas = Math.max(1, Math.ceil(data.length / REGISTROS_POR_PAGINA));
            if (prestamosPaginaActual > totalPaginas) prestamosPaginaActual = totalPaginas;
            const inicio = (prestamosPaginaActual - 1) * REGISTROS_POR_PAGINA;
            const paginaData = data.slice(inicio, inicio + REGISTROS_POR_PAGINA);

            tabla.innerHTML = "";
            if (!paginaData.length) {
                tabla.innerHTML = `<tr><td colspan="7" class="text-center text-muted">Sin resultados.</td></tr>`;
            }

            paginaData.forEach(p => {
                tabla.innerHTML += `
            <tr>
                <td>${p.usuario_detalle}</td>
                <td>${p.ejemplar_detalle}</td>
                <td>${p.fecha_prestamo}</td>
                <td>${p.fecha_devolucion}</td>
                <td>${badgeEstado(p.estado)}</td>
                <td>${p.dias_atraso}</td>
                <td>
                    <button class="btn btn-success btn-sm"
                        onclick="devolver(${p.id})">
                        Devolver
                    </button>
                    <button class="btn btn-danger btn-sm"
                        onclick="eliminarPrestamo(${p.id})">
                        Archivar
                    </button>
                </td>
            </tr>
        `;
            });

            renderizarPaginacionPrestamos(totalPaginas);
        }

        function renderizarPaginacionPrestamos(totalPaginas) {
            const paginacion = document.getElementById("paginacionPrestamos");
            paginacion.innerHTML = "";

            for (let pagina = 1; pagina <= totalPaginas; pagina++) {
                paginacion.innerHTML += `
                    <li class="page-item ${pagina === prestamosPaginaActual ? "active" : ""}">
                        <button class="page-link" type="button" onclick="irPaginaPrestamos(${pagina})">${pagina}</button>
                    </li>
                `;
            }
        }

        function irPaginaPrestamos(pagina) {
            prestamosPaginaActual = pagina;
            renderizarTablaPrestamos();
        }

        // ================= BADGE =================
        function badgeEstado(e) {
            if (e === 'P') return '<span class="badge bg-warning">Prestado</span>';
            if (e === 'D') return '<span class="badge bg-success">Devuelto</span>';
            if (e === 'A') return '<span class="badge bg-danger">Atrasado</span>';
        }

        // ================= CARGAR SELECTS =================
async function cargarSelects() {

    const usuarios = await fetch(`${API}/usuarios/`).then(r => r.json());
    const libros = await fetch(`${API}/libros/`).then(r => r.json());

    const selUser = document.getElementById("crear_usuario");
    const selLibro = document.getElementById("crear_libro");

    selUser.innerHTML = "";
    selLibro.innerHTML = "";

    usuarios.forEach(u => {
        selUser.innerHTML += `<option value="${u.id}">${u.nombre}</option>`;
    });

    libros.forEach(l => {
        selLibro.innerHTML += `<option value="${l.id}">${l.titulo}</option>`;
    });

    
    cargarEjemplaresLibro();
    precargarFechaDevolucion();
}
        // ================= CREAR =================
        async function crearPrestamo() {

            const usuario = document.getElementById("crear_usuario").value;
            const ejemplar = document.getElementById("crear_ejemplar").value;
            const fecha_devolucion = document.getElementById("crear_fecha_dev").value;

            const response = await fetch(`${API}/prestamos/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": csrfToken
                },
                body: JSON.stringify({
                    usuario,
                    ejemplar,
                    fecha_devolucion
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                alert(errorData.detail || errorData.non_field_errors?.[0] || "No se pudo registrar el préstamo");
                return;
            }

            await cargarPrestamos();
            await cargarEjemplaresLibro();
            bootstrap.Modal.getInstance(document.getElementById('modalCrear')).hide();
        }

        // ================= DEVOLVER =================
        async function devolver(id) {

            await fetch(`${API}/prestamos/${id}/devolver/`, {
                method: "POST",
                headers: {
                    "X-CSRFToken": csrfToken
                }
            });
            cargarPrestamos();
        }

        // ================= ELIMINAR =================
        async function eliminarPrestamo(id) {

            if (!confirm("¿Archivar préstamo?")) return;

            await fetch(`${API}/prestamos/${id}/`, {
                method: "DELETE",
                headers: {
                    "X-CSRFToken": csrfToken
                }
            });

            cargarPrestamos();
        }

        // ================= FILTRO =================
        function filtrarPrestamos() {
            prestamosPaginaActual = 1;
            renderizarTablaPrestamos();
        }

        // ================= INIT =================
        cargarPrestamos();
        cargarSelects();
        modalCrear.addEventListener('shown.bs.modal', precargarFechaDevolucion);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
