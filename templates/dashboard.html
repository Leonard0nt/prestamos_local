<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Préstamos - Biblioteca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    .table {
        border-collapse: collapse !important;
    }

    thead th {
        position: sticky;
        top: 0;
        background-color: #212529;
        z-index: 2;
    }
</style>

<body style="background-color: #f1f3f5;">

    <div class="d-flex justify-content-center align-items-center min-vh-100">

        <div class="bg-white p-4 rounded shadow-lg" style="width: 100%; max-width: 1100px;">

            <h2 class="mb-4">📦 Gestión de Préstamos</h2>

            <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalCrear">
                ➕ Nuevo Préstamo
            </button>

            <input type="text" id="buscadorPrestamos" class="form-control mb-3" placeholder="🔍 Buscar..."
                onkeyup="filtrarPrestamos()">

            <div style="max-height: 400px; overflow-y: auto;">
                <table class="table table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Usuario</th>
                            <th>Libro</th>
                            <th>F. Préstamo</th>
                            <th>F. Devolución</th>
                            <th>Estado</th>
                            <th>Días atraso</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaPrestamos"></tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- MODAL CREAR -->
    <div class="modal fade" id="modalCrear">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5>Nuevo Préstamo</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <select id="crear_usuario" class="form-control mb-2"></select>
                    <select id="crear_libro" class="form-control mb-2" onchange="cargarEjemplaresLibro()"></select>

                    <select id="crear_ejemplar" class="form-control mb-2">
                        <option value="">Selecciona un ejemplar</option>
                    </select>

                    <label>Fecha devolución</label>
                    <input type="date" id="crear_fecha_dev" class="form-control">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success" onclick="crearPrestamo()">Guardar</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";

        // ================= CARGAR EJEMPLARES =================
async function cargarEjemplaresLibro() {

    const libroId = document.getElementById("crear_libro").value;

    if (!libroId) return; // 

    const res = await fetch(`${API}/libros/${libroId}/ejemplares_json/`);
    const data = await res.json();

    const select = document.getElementById("crear_ejemplar");
    select.innerHTML = "";

    data.forEach(e => {
        if (e.estado === "disponible") {
            select.innerHTML += `
                <option value="${e.id}">
                    ${e.codigo} (${e.estado})
                </option>
            `;
        }
    });

    if (select.innerHTML === "") {
        select.innerHTML = `<option>No hay ejemplares disponibles</option>`;
    }
}
        // ================= CARGAR =================
        async function cargarPrestamos() {
            const res = await fetch(`${API}/prestamos/`);
            const data = await res.json();

            const tabla = document.getElementById("tablaPrestamos");
            tabla.innerHTML = "";

            data.forEach(p => {
                tabla.innerHTML += `
            <tr>
                <td>${p.usuario_detalle}</td>
                <td>${p.ejemplar_detalle}</td>
                <td>${p.fecha_prestamo}</td>
                <td>${p.fecha_devolucion}</td>
                <td>${badgeEstado(p.estado)}</td>
                <td>${p.dias_atraso}</td>
                <td>
                    <button class="btn btn-success btn-sm"
                        onclick="devolver(${p.id})">
                        Devolver
                    </button>
                    <button class="btn btn-danger btn-sm"
                        onclick="eliminarPrestamo(${p.id})">
                        Archivar
                    </button>
                </td>
            </tr>
        `;
            });
        }

        // ================= BADGE =================
        function badgeEstado(e) {
            if (e === 'P') return '<span class="badge bg-warning">Prestado</span>';
            if (e === 'D') return '<span class="badge bg-success">Devuelto</span>';
            if (e === 'A') return '<span class="badge bg-danger">Atrasado</span>';
        }

        // ================= CARGAR SELECTS =================
async function cargarSelects() {

    const usuarios = await fetch(`${API}/usuarios/`).then(r => r.json());
    const libros = await fetch(`${API}/libros/`).then(r => r.json());

    const selUser = document.getElementById("crear_usuario");
    const selLibro = document.getElementById("crear_libro");

    selUser.innerHTML = "";
    selLibro.innerHTML = "";

    usuarios.forEach(u => {
        selUser.innerHTML += `<option value="${u.id}">${u.nombre}</option>`;
    });

    libros.forEach(l => {
        selLibro.innerHTML += `<option value="${l.id}">${l.titulo}</option>`;
    });

    
    cargarEjemplaresLibro();
}
        // ================= CREAR =================
        async function crearPrestamo() {

            const usuario = document.getElementById("crear_usuario").value;
            const ejemplar = document.getElementById("crear_ejemplar").value;
            const fecha_devolucion = document.getElementById("crear_fecha_dev").value;

            await fetch(`${API}/prestamos/`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    usuario,
                    ejemplar,
                    fecha_devolucion
                })
            });
            ejemplar.estado = 'P'
            console.log("Libro ID:", libroId);
            if (!libroId || libroId === "undefined") {
    console.error("ID inválido");
    return;
}
            cargarPrestamos();
            bootstrap.Modal.getInstance(document.getElementById('modalCrear')).hide();
        }

        // ================= DEVOLVER =================
        async function devolver(id) {

            await fetch(`${API}/prestamos/${id}/devolver/`, {
                method: "POST"
            });
            ejemplar.estado = 'D'
            cargarPrestamos();
        }

        // ================= ELIMINAR =================
        async function eliminarPrestamo(id) {

            if (!confirm("¿Archivar préstamo?")) return;

            await fetch(`${API}/prestamos/${id}/`, {
                method: "DELETE"
            });

            cargarPrestamos();
        }

        // ================= FILTRO =================
        function filtrarPrestamos() {
            const filtro = document.getElementById("buscadorPrestamos").value.toLowerCase();
            const filas = document.querySelectorAll("#tablaPrestamos tr");

            filas.forEach(f => {
                const texto = f.innerText.toLowerCase();
                f.style.display = texto.includes(filtro) ? "" : "none";
            });
        }

        // ================= INIT =================
        cargarPrestamos();
        cargarSelects();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
