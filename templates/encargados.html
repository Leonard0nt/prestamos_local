<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Encargados - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
.table {
    border-collapse: collapse !important;
}

thead th {
    position: sticky;
    top: 0;
    background-color: #212529;
    z-index: 2;
}
</style>
<body style="background-color: #f1f3f5;">

    {% include 'partials/app_menu.html' with active='encargados' %}

    <form style="display:none;">{% csrf_token %}</form>

    <div class="d-flex justify-content-center py-4">
        <div class="bg-white p-4 rounded shadow-lg" style="width: 100%; max-width: 1100px;">
            <h2 class="mb-4">🧑‍💼 Gestión de Encargados de Biblioteca</h2>

            <div class="mb-3">
                <input type="text" id="buscadorEncargados" class="form-control" placeholder="🔍 Buscar por nombre, RUT o correo..." onkeyup="filtrarEncargados()">
            </div>

            <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#modalCrearEncargado">
                ➕ Agregar Encargado
            </button>

            <div style="max-height: 400px; overflow-y: auto;">
                <table class="table table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>RUT</th>
                            <th>Correo</th>
                            <th>Nivel</th>
                            <th>Creado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaEncargados"></tbody>
                </table>
            </div>
            <nav class="mt-3" aria-label="Paginación encargados">
                <ul class="pagination justify-content-center mb-0" id="paginacionEncargados"></ul>
            </nav>
        </div>
    </div>

    <div class="modal fade" id="modalCrearEncargado">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Crear Encargado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="crear_nombres" class="form-control mb-2" placeholder="Nombres">
                    <input id="crear_apellidos" class="form-control mb-2" placeholder="Apellidos">
                    <input id="crear_rut"
                           class="form-control mb-2"
                           placeholder="12.345.678-5"
                           oninput="formatearRUT(this)"
                           onblur="validarRUT(this)">
                    <div id="error_rut_crear" class="text-danger small"></div>
                    <input id="crear_correo" class="form-control mb-2" placeholder="Correo">
                    <select id="crear_nivel" class="form-select mb-2">
                        <option value="BASICA">Basica</option>
                        <option value="MEDIA">Media</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success" onclick="crearEncargado()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarEncargado">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Editar Encargado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit_id">
                    <input id="edit_nombres" class="form-control mb-2" placeholder="Nombres">
                    <input id="edit_apellidos" class="form-control mb-2" placeholder="Apellidos">
                    <input id="edit_rut"
                           class="form-control mb-2"
                           placeholder="12.345.678-5"
                           oninput="formatearRUT(this)"
                           onblur="validarRUT(this)">
                    <div id="error_rut_edit" class="text-danger small"></div>
                    <input id="edit_correo" class="form-control mb-2" placeholder="Correo">
                    <select id="edit_nivel" class="form-select mb-2">
                        <option value="BASICA">Basica</option>
                        <option value="MEDIA">Media</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-warning" onclick="guardarEdicion()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

<script>
const API = window.location.origin;
const REGISTROS_POR_PAGINA = 20;
let encargadosData = [];
let encargadosPaginaActual = 1;

function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return '';
}

function formatearRUT(input) {
    let valor = input.value.replace(/[^0-9kK]/g, '').toUpperCase();

    if (valor.length > 1) {
        let cuerpo = valor.slice(0, -1);
        const dv = valor.slice(-1);

        cuerpo = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        input.value = `${cuerpo}-${dv}`;
        return;
    }

    input.value = valor;
}

function limpiarRUT(rut = "") {
    return String(rut).replace(/[.\-]/g, '');
}

function validarRUT(input) {
    const errorDiv = input.id && input.id.includes("crear")
        ? document.getElementById("error_rut_crear")
        : document.getElementById("error_rut_edit");
    const rut = input.value;
    let valor = rut.replace(/\./g, '').replace('-', '');

    if (valor.length < 2) {
        errorDiv.innerText = 'RUT inválido';
        return false;
    }

    const cuerpo = valor.slice(0, -1);
    const dv = valor.slice(-1).toUpperCase();

    let suma = 0;
    let multiplo = 2;

    for (let i = cuerpo.length - 1; i >= 0; i--) {
        suma += multiplo * Number(cuerpo.charAt(i));
        multiplo = multiplo < 7 ? multiplo + 1 : 2;
    }

    let dvEsperado = 11 - (suma % 11);

    if (dvEsperado === 11) dvEsperado = '0';
    else if (dvEsperado === 10) dvEsperado = 'K';
    else dvEsperado = String(dvEsperado);

    if (dv !== dvEsperado) {
        errorDiv.innerText = 'RUT inválido';
        return false;
    }

    errorDiv.innerText = '';
    return true;
}

function separarNombreCompleto(nombreCompleto = "") {
    const nombreLimpio = (nombreCompleto || "").trim().replace(/\s+/g, " ");
    if (!nombreLimpio) {
        return { nombres: "", apellidos: "" };
    }

    const partes = nombreLimpio.split(" ");
    if (partes.length === 1) {
        return { nombres: partes[0], apellidos: "" };
    }

    return {
        nombres: partes.slice(0, -1).join(" "),
        apellidos: partes.slice(-1).join(" ")
    };
}

function construirNombreCompleto(nombres, apellidos) {
    return [nombres, apellidos]
        .map((valor) => (valor || "").trim())
        .filter(Boolean)
        .join(" ");
}

async function cargarEncargados() {
    const res = await fetch(`${API}/encargados/`);

    if (!res.ok) {
        document.getElementById("tablaEncargados").innerHTML = `<tr><td colspan="6">Debes iniciar sesión como administrador para gestionar encargados.</td></tr>`;
    
        document.getElementById("paginacionEncargados").innerHTML = "";
        encargadosData = [];
        encargadosPaginaActual = 1;
        return;
    }
    encargadosData = await res.json();
    encargadosPaginaActual = 1;
    renderizarTablaEncargados();
}

function obtenerEncargadosFiltrados() {
    const filtro = document.getElementById("buscadorEncargados").value.toLowerCase();
    return encargadosData.filter((encargado) => {
        return (
            encargado.nombre.toLowerCase().includes(filtro) ||
            encargado.rut.toLowerCase().includes(filtro) ||
            encargado.correo.toLowerCase().includes(filtro) ||
            (encargado.nivel || "").toLowerCase().includes(filtro)
        );
    });
}

function renderizarTablaEncargados() {
    const data = obtenerEncargadosFiltrados();
    const tabla = document.getElementById("tablaEncargados");
    const totalPaginas = Math.max(1, Math.ceil(data.length / REGISTROS_POR_PAGINA));
    if (encargadosPaginaActual > totalPaginas) encargadosPaginaActual = totalPaginas;
    const inicio = (encargadosPaginaActual - 1) * REGISTROS_POR_PAGINA;
    const paginaData = data.slice(inicio, inicio + REGISTROS_POR_PAGINA);

    tabla.innerHTML = "";
    if (!paginaData.length) {
        tabla.innerHTML = `<tr><td colspan="6" class="text-center text-muted">Sin resultados.</td></tr>`;
    }



    paginaData.forEach(e => {
        tabla.innerHTML += `
            <tr>
                <td>${e.nombre}</td>
                <td>${e.rut}</td>
                <td>${e.correo}</td>
                <td>${e.nivel === "MEDIA" ? "Media" : "Basica"}</td>
                <td>${new Date(e.creado_en).toLocaleDateString()}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick='abrirEditar(${JSON.stringify(e)})'>
                        Editar
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="reestablecerPasswordEncargado(${e.id})">
                        Reestablecer cuenta
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="eliminarEncargado(${e.id})">
                        Eliminar
                    </button>
                </td>
            </tr>
        `;
    });

    renderizarPaginacionEncargados(totalPaginas);
}

function renderizarPaginacionEncargados(totalPaginas) {
    const paginacion = document.getElementById("paginacionEncargados");
    paginacion.innerHTML = "";

    for (let pagina = 1; pagina <= totalPaginas; pagina++) {
        paginacion.innerHTML += `
            <li class="page-item ${pagina === encargadosPaginaActual ? "active" : ""}">
                <button class="page-link" type="button" onclick="irPaginaEncargados(${pagina})">${pagina}</button>
            </li>
        `;
    }
}

function irPaginaEncargados(pagina) {
    encargadosPaginaActual = pagina;
    renderizarTablaEncargados();
}

function filtrarEncargados() {
    encargadosPaginaActual = 1;
    renderizarTablaEncargados();
}

async function crearEncargado() {
    const rutInput = document.getElementById("crear_rut");

    if (!validarRUT(rutInput)) {
        alert("RUT inválido");
        return;
    }

    const payload = {
        nombre: construirNombreCompleto(
            document.getElementById("crear_nombres").value,
            document.getElementById("crear_apellidos").value
        ),
        rut: document.getElementById("crear_rut").value,
        correo: document.getElementById("crear_correo").value,
        nivel: document.getElementById("crear_nivel").value,
    };

    const response = await fetch(`${API}/encargados/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
        },
        credentials: "same-origin",
        body: JSON.stringify(payload)
    });

    const data = await response.json().catch(() => ({}));

    if (!response.ok) {
        alert(data.detail || data.rut?.[0] || data.correo?.[0] || "No se pudo crear el encargado");
        return;
    }

    if (data.password_temporal) {
        const usuarioSinFormato = limpiarRUT(payload.rut);
        alert(`Encargado creado. Usuario: ${usuarioSinFormato} | Contraseña temporal: ${data.password_temporal}`);
    }

    bootstrap.Modal.getInstance(document.getElementById('modalCrearEncargado')).hide();
    cargarEncargados();
}

function abrirEditar(e) {
    const { nombres, apellidos } = separarNombreCompleto(e.nombre);
    document.getElementById("edit_id").value = e.id;
    document.getElementById("edit_nombres").value = nombres;
    document.getElementById("edit_apellidos").value = apellidos;
    document.getElementById("edit_rut").value = e.rut;
    document.getElementById("edit_correo").value = e.correo;
    document.getElementById("edit_nivel").value = e.nivel || "BASICA";

    const modal = new bootstrap.Modal(document.getElementById("modalEditarEncargado"));
    modal.show();
}

async function guardarEdicion() {
    const id = document.getElementById("edit_id").value;
    const rutInput = document.getElementById("edit_rut");

    if (!validarRUT(rutInput)) {
        alert("RUT inválido");
        return;
    }

    const payload = {
        nombre: construirNombreCompleto(
            document.getElementById("edit_nombres").value,
            document.getElementById("edit_apellidos").value
        ),
        rut: rutInput.value,
        correo: document.getElementById("edit_correo").value,
        nivel: document.getElementById("edit_nivel").value,
    };

    const response = await fetch(`${API}/encargados/${id}/`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
        },
        credentials: "same-origin",
        body: JSON.stringify(payload)
    });

    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
        alert(data.detail || data.rut?.[0] || data.correo?.[0] || "No se pudo actualizar el encargado");
        return;
    }

    bootstrap.Modal.getInstance(document.getElementById('modalEditarEncargado')).hide();
    cargarEncargados();
}

async function eliminarEncargado(id) {
    if (!confirm("¿Eliminar encargado?")) return;

    const response = await fetch(`${API}/encargados/${id}/`, {
        method: "DELETE",
        headers: {
            "X-CSRFToken": getCookie("csrftoken")
        },
        credentials: "same-origin"
    });

    if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        alert(data.detail || "No se pudo eliminar el encargado");
        return;
    }

    cargarEncargados();
}

async function reestablecerCuentaEncargado(id) {
    if (!confirm("¿Reestablecer cuenta al valor inicial (usuario desde RUT y clave temporal)?")) return;

    const response = await fetch(`${API}/encargados/${id}/reestablecer_password/`, {
        method: "POST",
        headers: {
            "X-CSRFToken": getCookie("csrftoken")
        },
        credentials: "same-origin"
    });

    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
        alert(data.detail || "No se pudo reestablecer la cuenta");
        return;
    }

    alert(
        `Cuenta reestablecida.\nUsuario: ${data.username_inicial}\nContraseña temporal: ${data.password_temporal}`
    );
}

cargarEncargados();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
