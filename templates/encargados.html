<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Encargados - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
.table {
    border-collapse: collapse !important;
}

thead th {
    position: sticky;
    top: 0;
    background-color: #212529;
    z-index: 2;
}
</style>
<body style="background-color: #f1f3f5;">

    {% include 'partials/app_menu.html' with active='encargados' %}

    <form style="display:none;">{% csrf_token %}</form>

    <div class="d-flex justify-content-center py-4">
        <div class="bg-white p-4 rounded shadow-lg" style="width: 100%; max-width: 1100px;">
            <h2 class="mb-4">🧑‍💼 Gestión de Encargados de Biblioteca</h2>

            <div class="mb-3">
                <input type="text" id="buscadorEncargados" class="form-control" placeholder="🔍 Buscar por nombre, RUT o correo..." onkeyup="filtrarEncargados()">
            </div>

            <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#modalCrearEncargado">
                ➕ Agregar Encargado
            </button>

            <div style="max-height: 400px; overflow-y: auto;">
                <table class="table table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>RUT</th>
                            <th>Correo</th>
                            <th>Creado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaEncargados"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCrearEncargado">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Crear Encargado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="crear_nombre" class="form-control mb-2" placeholder="Nombre">
                    <input id="crear_rut"
                           class="form-control mb-2"
                           placeholder="12.345.678-5"
                           oninput="formatearRUT(this)"
                           onblur="validarRUT(this)">
                    <div id="error_rut_crear" class="text-danger small"></div>
                    <input id="crear_correo" class="form-control mb-2" placeholder="Correo">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success" onclick="crearEncargado()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

<script>
const API = "http://127.0.0.1:8000";


function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return '';
}

function formatearRUT(input) {
    let valor = input.value.replace(/[^0-9kK]/g, '').toUpperCase();

    if (valor.length > 1) {
        let cuerpo = valor.slice(0, -1);
        const dv = valor.slice(-1);

        cuerpo = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        input.value = `${cuerpo}-${dv}`;
        return;
    }

    input.value = valor;
}

function validarRUT(input) {
    const errorDiv = document.getElementById('error_rut_crear');
    const rut = input.value;
    let valor = rut.replace(/\./g, '').replace('-', '');

    if (valor.length < 2) {
        errorDiv.innerText = 'RUT inválido';
        return false;
    }

    const cuerpo = valor.slice(0, -1);
    const dv = valor.slice(-1).toUpperCase();

    let suma = 0;
    let multiplo = 2;

    for (let i = cuerpo.length - 1; i >= 0; i--) {
        suma += multiplo * Number(cuerpo.charAt(i));
        multiplo = multiplo < 7 ? multiplo + 1 : 2;
    }

    let dvEsperado = 11 - (suma % 11);

    if (dvEsperado === 11) dvEsperado = '0';
    else if (dvEsperado === 10) dvEsperado = 'K';
    else dvEsperado = String(dvEsperado);

    if (dv !== dvEsperado) {
        errorDiv.innerText = 'RUT inválido';
        return false;
    }

    errorDiv.innerText = '';
    return true;
}

async function cargarEncargados() {
    const res = await fetch(`${API}/encargados/`);

    if (!res.ok) {
        document.getElementById("tablaEncargados").innerHTML = `<tr><td colspan="4">Debes iniciar sesión como administrador para gestionar encargados.</td></tr>`;
        return;
    }

    const data = await res.json();
    const tabla = document.getElementById("tablaEncargados");
    tabla.innerHTML = "";

    data.forEach(e => {
        tabla.innerHTML += `
            <tr>
                <td>${e.nombre}</td>
                <td>${e.rut}</td>
                <td>${e.correo}</td>
                <td>${new Date(e.creado_en).toLocaleString()}</td>
            </tr>
        `;
    });
}

function filtrarEncargados() {
    const filtro = document.getElementById("buscadorEncargados").value.toLowerCase();
    const filas = document.querySelectorAll("#tablaEncargados tr");

    filas.forEach(fila => {
        const texto = fila.innerText.toLowerCase();
        fila.style.display = texto.includes(filtro) ? "" : "none";
    });
}

async function crearEncargado() {
    const rutInput = document.getElementById("crear_rut");

    if (!validarRUT(rutInput)) {
        alert("RUT inválido");
        return;
    }

    const payload = {
        nombre: document.getElementById("crear_nombre").value,
        rut: document.getElementById("crear_rut").value,
        correo: document.getElementById("crear_correo").value,
    };

    const response = await fetch(`${API}/encargados/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
        },
        credentials: "same-origin",
        body: JSON.stringify(payload)
    });

    const data = await response.json().catch(() => ({}));

    if (!response.ok) {
        alert(data.detail || data.rut?.[0] || data.correo?.[0] || "No se pudo crear el encargado");
        return;
    }

    if (data.password_temporal) {
        alert(`Encargado creado. Usuario: ${payload.rut} | Contraseña temporal: ${data.password_temporal}`);
    }

    bootstrap.Modal.getInstance(document.getElementById('modalCrearEncargado')).hide();
    cargarEncargados();
}

cargarEncargados();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
